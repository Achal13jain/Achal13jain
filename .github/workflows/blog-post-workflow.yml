name: Latest blog post workflow

on:

  schedule:

    - cron: "0 * * * *"

  workflow_dispatch:

jobs:

  update-readme-with-blog:

    runs-on: ubuntu-latest

    steps:

      - uses: gautamkrishnar/blog-post-workflow@v1

        with:

          feed_list: "https://medium.com/feed/@jainachal38"
          max_post_count: 4